name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. 檢查 HF_TOKEN 是否存在
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ 錯誤：在 GitHub Actions 中找不到 HF_TOKEN 機密！"
            echo "💡 請在您的 GitHub 專案中，前往: Settings -> Secrets and variables -> Actions -> Repository secrets"
            echo "並新增一個名稱為 'HF_TOKEN' 的 Secret，且其內容應為在 Hugging Face 申請的 Write 權限 Token。"
            exit 1
          fi
          
          # 2. 自動檢查 Token 長度與格式，提供友善警告
          # 移除可能不小心複製進來的換行或空白
          CLEANED_TOKEN=$(echo -n "$HF_TOKEN" | tr -d '\r\n[:space:]')
          
          if [[ ! "$CLEANED_TOKEN" =~ ^hf_ ]]; then
            echo "⚠️ 警告：您的 HF_TOKEN 似乎不是以 'hf_' 開頭，這通常是 Hugging Face Access Token 的格式。"
            echo "💡 請確認您複製的是完整的 Token，並且沒有不小心貼成其他字串（例如 Space 的 URL 或 Username）。"
          fi
          
          # 3. 設定 Git 使用者資訊
          git config --global user.email "deploy-bot@huggingface.co"
          git config --global user.name "HuggingFace Deploy Bot"
          
          # 解決可能的 credential 衝突
          git config --global --unset-all credential.helper || true
          
          echo "ℹ️ 正在推送至 Hugging Face Space (shaohan-webdesign/web-sandbox-testing)..."
          
          # 4. 嘗試進行推送，使用 oauth2 作為使用者名稱（這是 Hugging Face 官方最推薦、最穩定的 Git 驗證格式）
          # 這可以避免因為帳號名稱包含連字號（如 shaohan-webdesign）或與 Token 擁有者不一致而導致的驗證失敗 (Exit Code 128)
          echo "🚀 正在使用 oauth2 協議推送至 Hugging Face Space (shaohan-webdesign/web-sandbox-testing)..."
          
          if ! git push --force "https://oauth2:${CLEANED_TOKEN}@huggingface.co/spaces/shaohan-webdesign/web-sandbox-testing" HEAD:main 2>git_error.log; then
            echo "❌ 部署失敗！Git 錯誤如下："
            cat git_error.log
            echo ""
            echo "================================================================"
            echo "💡 【如何排查與解決 Exit Code 128 / 驗證失敗問題】"
            echo "================================================================"
            echo "1. 您的 HF_TOKEN 權限（最常見原因）："
            echo "   👉 請前往 Hugging Face 官網 -> 您的右上角頭像 -> Settings -> Access Tokens"
            echo "   👉 請檢查您所複製的 Token！它的角色 (Role) 必須是 'Write' (寫入權限)。"
            echo "   👉 如果它是 'Read' (唯讀)，請新增一個 Role 為 'Write' 的 Token，並貼到 GitHub Secrets 中。"
            echo ""
            echo "2. 檢查 GitHub Secret 設定："
            echo "   👉 請前往您的 GitHub 儲存庫 -> Settings -> Secrets and variables -> Actions"
            echo "   👉 請確認下方那格 'Repository secrets' 中有 HF_TOKEN。"
            echo "   👉 請不要儲存到 'Environment secrets' 中（除非有設定環境）。"
            echo ""
            echo "3. 檢查 Space 是否存在："
            echo "   👉 請確認您的 Space 完整路徑為: shaohan-webdesign/web-sandbox-testing"
            echo "   👉 若您改過 Space 名稱，請通知我修改此 YML 檔。"
            echo "================================================================"
            exit 1
          fi
          
          echo "🎉 恭喜！推送至 Hugging Face Space 成功！"

