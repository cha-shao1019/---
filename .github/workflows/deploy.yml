name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. 檢查 HF_TOKEN 是否存在
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ 錯誤：在 GitHub Actions 中找不到 HF_TOKEN 機密！"
            echo "💡 請在您的 GitHub 專案中，前往: Settings -> Secrets and variables -> Actions -> Repository secrets"
            echo "並新增一個名稱為 'HF_TOKEN' 的 Secret，且其內容應為在 Hugging Face 申請的 Write 權限 Token。"
            exit 1
          fi
          
          # 2. 自動檢查 Token 長度與格式，提供友善警告
          CLEANED_TOKEN=$(echo -n "$HF_TOKEN" | tr -d '\r\n[:space:]')
          
          if [[ ! "$CLEANED_TOKEN" =~ ^hf_ ]]; then
            echo "⚠️ 警告：您的 HF_TOKEN 似乎不是以 'hf_' 開頭，這通常是 Hugging Face Access Token 的格式。"
            echo "💡 請確認您複製的是完整的 Token，並且沒有不小心貼成其他字串（例如 Space 的 URL 或 Username）。"
          fi
          
          # 3. 確保 README.md 包含正確的 Hugging Face YAML Frontmatter
          # 避免 AI Studio 在導出/同步到 GitHub 時，自動覆寫 README.md 並洗掉部署 YAML
          echo "📝 偵測到 README.md，正在為其注入最新的 Hugging Face YAML 設定..."
          cat << 'EOF' > temp_readme.md
---
title: Web Sandbox Testing
emoji: 🚀
colorFrom: blue
colorTo: gray
sdk: docker
app_port: 7860
pinned: false
---

EOF

          if [ -f README.md ]; then
            # 如果 README.md 本身已經有 YAML 檔頭，我們使用 awk 完美將其剝離後再附加，防止重複疊加
            if head -n 1 README.md | grep -q "^---"; then
              echo "🧹 移去現有的舊版 Frontmatter..."
              awk 'BEGIN {show=0} /^---$/ {show++; next} show>=2 {print} show<2 && !/^---$/ && show>0 {next} show==0 {print}' README.md >> temp_readme.md
            else
              cat README.md >> temp_readme.md
            fi
          else
            echo "# Web Sandbox Testing" >> temp_readme.md
          fi
          mv temp_readme.md README.md

          # 4. 設定 Git 使用者資訊並建立 Commit
          git config --global user.email "deploy-bot@huggingface.co"
          git config --global user.name "HuggingFace Deploy Bot"
          
          git config --global --unset-all credential.helper || true
          
          git add README.md
          git commit -m "chore: inject hugging face configuration header [skip ci]" || true
          
          # 5. 直接推送最新代碼至 Hugging Face Spaces (shaohan-webdesign/web-sandbox-testing) main 分支
          echo "🚀 正在推送最新程式碼至 Hugging Face Space main 分支..."
          HF_REPO_URL="https://oauth2:${CLEANED_TOKEN}@huggingface.co/spaces/shaohan-webdesign/web-sandbox-testing"
          
          if git push --force "$HF_REPO_URL" HEAD:main 2>git_push_error.log; then
            echo "🎉 恭喜！已成功成功推送部署至 Hugging Face Space main 分支！"
          else
            echo "❌ 部署失敗！錯誤訊息如下："
            cat git_push_error.log
            echo ""
            echo "================================================================"
            echo "💡 【如何排查與解決驗證失敗或路徑問題】"
            echo "================================================================"
            echo "1. 您的 HF_TOKEN 權限（最常見原因）："
            echo "   👉 請確認此 Token 在 Hugging Face 申請時具有 'Write' (寫入) 權限，而不是 'Read'。"
            echo "2. 檢查 GitHub Secret 設定："
            echo "   👉 請確認 GitHub 專案 Settings -> Secrets and variables -> Actions 中有一項名為 'HF_TOKEN' 的 Secret。"
            echo "3. 檢查 Space 的存在與名稱："
            echo "   👉 請確認您的 Space 名稱是否與 'shaohan-webdesign/web-sandbox-testing' 完全相符。"
            echo "================================================================"
            exit 1
          fi
          
          echo "🎉 恭喜！已完成推送部署作業！"

