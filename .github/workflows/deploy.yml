name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. 檢查 HF_TOKEN 是否存在
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ 錯誤：在 GitHub Actions 中找不到 HF_TOKEN 機密！"
            echo "💡 請在您的 GitHub 專案中，前往: Settings -> Secrets and variables -> Actions -> Repository secrets"
            echo "並新增一個名稱為 'HF_TOKEN' 的 Secret，且其內容應為在 Hugging Face 申請的 Write 權限 Token。"
            exit 1
          fi
          
          # 2. 自動檢查 Token 長度與格式，提供友善警告
          CLEANED_TOKEN=$(echo -n "$HF_TOKEN" | tr -d '\r\n[:space:]')
          
          case "$CLEANED_TOKEN" in
            hf_*) ;;
            *)
              echo "⚠️ 警告：您的 HF_TOKEN 似乎不是以 'hf_' 開頭，這通常是 Hugging Face Access Token 的格式。"
              echo "💡 請確認您複製的是完整的 Token，並且沒有不小心貼成其他字串（例如 Space 的 URL 或 Username）。"
              ;;
          esac
          
          # 3. 確保 README.md 包含正確的 Hugging Face YAML Frontmatter
          # 避免 AI Studio 在導出/同步到 GitHub 時，自動覆寫 README.md 並洗掉部署 YAML
          echo "📝 偵測並更新 README.md，確保含有正確的 Hugging Face YAML 設定..."
          if [ -f README.md ]; then
            # 檢查 README.md 是否有包含 sdk: docker 標籤
            if grep -q "sdk: docker" README.md; then
              echo "✅ README.md 已經包含 Hugging Face 設定，不做重複注入。"
            else
              echo "📝 正在為 README.md 注入 YAML 檔頭..."
              cat << 'EOF' > temp_readme.md
---
title: Web Sandbox Testing
emoji: 🚀
colorFrom: blue
colorTo: gray
sdk: docker
app_port: 7860
pinned: false
---

EOF
              cat README.md >> temp_readme.md
              mv temp_readme.md README.md
            fi
          else
            echo "📝 找不到 README.md，建立預設之 README.md..."
            cat << 'EOF' > README.md
---
title: Web Sandbox Testing
emoji: 🚀
colorFrom: blue
colorTo: gray
sdk: docker
app_port: 7860
pinned: false
---

# Web Sandbox Testing
這是一個部署在 Hugging Face Spaces 上的 Docker 應用程式。
EOF
          fi

          # 4. 設定 Git 使用者資訊並建立 Commit
          git config --global user.email "deploy-bot@huggingface.co"
          git config --global user.name "HuggingFace Deploy Bot"
          
          git config --global --unset-all credential.helper || true
          
          git add README.md
          git commit -m "chore: inject hugging face configuration header [skip ci]" || true
          
          # 5. 直接推送最新代碼至 Hugging Face Spaces (shaohan-webdesign/web-sandbox-testing) main 分支
          echo "🚀 正在推送最新程式碼至 Hugging Face Space main 分支..."
          HF_REPO_URL="https://oauth2:${CLEANED_TOKEN}@huggingface.co/spaces/shaohan-webdesign/web-sandbox-testing"
          
          # 建立備份機制：優先不強推 (可能與遠端不衝突的情況)
          # 如果正常推送失敗，再嘗試強制推送。這能解決遠端分支保護或衝突的問題
          PUSH_OK=false
          
          echo "👉 嘗試正常 Fast-Forward 推送..."
          if git push "$HF_REPO_URL" HEAD:main 2>git_push_norm_err.log; then
            echo "🎉 [正常推送] 成功部署至 Hugging Face Space main 分支！"
            PUSH_OK=true
          else
            echo "⚠️ [正常推送] 失敗，訊息如下："
            cat git_push_norm_err.log
            
            echo "👉 [備份方案] 嘗試使用 Force-Push 強制推送覆寫..."
            if git push --force "$HF_REPO_URL" HEAD:main 2>git_push_force_err.log; then
              echo "🎉 [強制推送] 成功強制覆寫部署至 Hugging Face Space main 分支！"
              PUSH_OK=true
            else
              echo "❌ [強制推送] 失敗，訊息如下："
              cat git_push_force_err.log
            fi
          fi
          
          if [ "$PUSH_OK" = "false" ]; then
            echo "❌ 所有推送手法均失敗！"
            echo "================================================================"
            echo "💡 【如何手動排查與自我修復】"
            echo "================================================================"
            echo "1. 您的 HF_TOKEN 權限：請確認此 Token 在 Hugging Face (Settings -> Access Tokens)"
            echo "   必須具有 'Write' (寫入) 權限，而不是僅有 'Read' 權限。"
            echo "2. 檢查 GitHub Secret 設定：請確認專案 Settings -> Secrets and variables -> Actions 中"
            echo "   有一項最上層的 Repository secret 名為 'HF_TOKEN'，內容為您的 HF Token 字串。"
            echo "3. 您可以直接在 Hugging Face 網頁上修改檔案："
            echo "   👉 請直接點擊您 Space 頂部的 'Files' 分頁。"
            echo "   👉 點擊並編輯 'README.md'，將頂部的 YAML Frontmatter 貼上，儲存後即刻重啟！"
            echo "================================================================"
            exit 1
          fi
          
          echo "🎉 恭喜！已完成推送部署作業！"

