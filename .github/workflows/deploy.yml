name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. 設定 Git 使用者資訊防止 push 失敗
          git config --global user.email "deploy-bot@huggingface.co"
          git config --global user.name "HuggingFace Deploy Bot"
          
          # 2. 加入 Hugging Face Space 的 Remote，使用剛剛儲存的 HF_TOKEN 進行驗證
          # 請確認下方 URL 中的 "shaohan-webdesign" 與 "web-sandbox-testing" 是否與您在 Hugging Face 建立的一致
          git remote add hf https://shaohan-webdesign:${HF_TOKEN}@huggingface.co/spaces/shaohan-webdesign/web-sandbox-testing
          
          # 3. 強制推送到 Hugging Face 的 main 分支
          git push --force hf HEAD:main
